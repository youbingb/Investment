# 模拟交易配置 — 100 USDT 小资金均线密集交易法
# 来源：币哥双均线交易系统 YouTube 视频

enabled: true

# 初始余额 100 USDT
initial_balance: 100

position:
  # 视频公式：仓位 = 最大亏损金额 / |开仓价 - 止损价|
  # 每笔最大亏损 10 USDT（视频示例用的就是 10-20 USDT）
  max_loss_per_trade: 10
  # 如果 max_loss_per_trade=0 则回退到百分比方式
  size_pct: 0.10
  # 单笔上限 30 USDT
  max_amount: 30
  # 单笔下限 5 USDT
  min_amount: 5

risk:
  # 止损 3%（均线密集突破，假突破概率不低，控制单笔亏损）
  stop_loss_pct: 3.0
  # 止盈 6%（赔率 1:2，兜底用，退出策略会覆盖）
  take_profit_pct: 6.0
  # 最多同时 2 个持仓（100 刀资金有限）
  max_open_positions: 2
  # 每个 symbol 最多 1 个方向
  max_positions_per_symbol: 1

# 退出策略（平仓法）
# 支持三种，按优先级尝试：
#   fixed_odds  — 赔率平仓法（固定赔率 1:N）
#   ma_cluster  — 上一个均线密集平仓法（需要 K 线数据）
#   fibonacci   — 斐波那契平仓法（突破历史新高用）
exit_strategy:
  method:
    - name: fixed_odds
      odds_ratio: 3.0
    - name: ma_cluster
      convergence_threshold: 0.5
      min_bars: 3
    - name: fibonacci
      primary_level: 1.618
      fallback_level: 2.618
  # 各策略的参数（也可以写在上面的 list 里）
  fixed_odds:
    odds_ratio: 3.0
  ma_cluster:
    convergence_threshold: 0.5
    min_bars: 3
  fibonacci:
    primary_level: 1.618
    fallback_level: 2.618

# 只交易均线密集相关规则
rules:
  allow:
    - ma_cluster_breakout    # 6MA 密集后突破（开仓方法 A）
    - ma20_pullback           # 均线发散后回踩 20 均线（开仓方法 B）
  deny: []

directions:
  long: true
  short: true
