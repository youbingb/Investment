# 信号规则开关与参数

rules:
  golden_cross:
    enabled: false
    fast: ema20
    slow: sma60

  dot_pullback:
    enabled: false
    dot: dot60
    tolerance_pct: 0.5

  # 双均线交易系统 · 开仓方法 A — 均线密集后突破
  ma_cluster_breakout:
    enabled: true
    cluster_width_pct: 0.6      # 6MA (max-min)/avg*100 ≤ 此值视为密集
    breakout_buffer_pct: 0.0    # 突破时 close 需超出簇 max/min 的额外缓冲

  # 双均线交易系统 · 开仓方法 B — 均线发散后回踩 20 均线不破
  ma20_pullback:
    enabled: true
    ma_col: ema20               # 用 ema20 或 sma20
    tolerance_pct: 0.3          # 当根 wick 距 ma20 在 ±此值内视为触碰
    min_spread_pct: 1.0         # 上根 bar 发散度门槛
    require_trend_align: true   # 是否强制 ema20/60/120 单调

notify:
  dedup_window_bars: 3
